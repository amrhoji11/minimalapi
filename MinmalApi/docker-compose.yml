version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - appnetwork
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build: .
    container_name: myapi
    ports:
      - "7118:8080"
    depends_on:
      - sqlserver
    networks:
      - appnetwork

networks:
  appnetwork:

volumes:
  sql_data: